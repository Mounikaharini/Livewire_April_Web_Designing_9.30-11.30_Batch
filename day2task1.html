<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <fieldset>
            <label>Name </label>
            <input type="text" placeholder="Enter Your Name"><br><br>

            <label style="color: blueviolet;">Age </label>
            <input type="number"><br><br>

            <label>Phone Number</label>
            <input type="text" required><br><br>

            <label>Email</label>
            <input type="email"><br><br>

            <label>Password</label>
            <input type="password"><br><br>

            <label>Gender</label>
            <input type="radio" name="1" id="">Male
            <input type="radio" name="1" id="">Female <br><br>

            <label>Skills</label>
            <input type="checkbox">Web Designing
            <input type="checkbox">Python
            <input type="checkbox">Java
            <input type="checkbox">SQL <br><br>

            <label>12 th %</label>
            <input type="range" name="" id=""> <br><br>

            <label>Resume</label>
            <input type="file"><br> <br>

            <button> SUBMIT </button>
        </fieldset>
    </form>
</body>

</html>
