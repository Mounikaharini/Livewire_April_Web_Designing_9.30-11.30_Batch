<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td,
        tr,
        th {
            border: 1px solid black;
        }

        th {
            background-color: rgb(181, 181, 252);
        }
    </style>
</head>

<body>
    <form>
        <fieldset>
            <legend>fill the form</legend>
            <table>
                <tr>
                    <th>Name</th>
                    <th>Value</th>
                </tr>
                <tr>
                    <td><label>Name</label></td>
                    <td><input type="text" name="" id=""></td>
                </tr>
                <tr>
                    <td><label>Gender</label></td>
                    <td>
                        <input type="radio" name="x">Male <br>
                        <input type="radio" name="x">Female

                    </td>
                </tr>
                <tr>
                    <td><label>Eyecolor</label></td>
                    <td>
                        <select name="" id="">
                            <option>green</option>
                            <option>blue</option>
                            <option>black</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label>Check all that apply</label></td>
                    <td>
                        <input type="checkbox">Over 6 feet tall <br>
                        <input type="checkbox">Over 200 pounds
                    </td>
                </tr>
                <tr>
                    <td colspan="2"><label>Describe your athletic ability:</label></td>
                </tr>
                <tr>
                    <td colspan="2"><textarea placeholder="Enter the comments"></textarea></td>
                </tr>
                <tr>
                    <td colspan="2" align="center"><button>Enter my information</button></td>
                </tr>
            </table>
        </fieldset>

    </form>

    <br>
    <iframe width="100%" height="600px" src="https://www.youtube.com/embed/Mstx_8Y2Wps?si=72UtKLBwn3nNKyym" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>

</html>
