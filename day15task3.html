<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="demo"></h1>
    <script>
        var d = new Date();
        document.write(d);
        document.write(d.toLocaleTimeString());
        document.write(d.toLocaleDateString());

        document.write("<br>"+Math.PI);
        document.write("<br>"+Math.sqrt(100));
        document.write("<br>"+Math.min(80, 70, 100, 40, 30, 60));
        document.write("<br>"+Math.max(80, 70, 100, 40, 30, 60));
        document.write("<br>"+Math.pow(10, 3));
        document.write("<br>"+Math.sin(45));
        document.write("<br>"+Math.random(1, 10));

    </script>
</body>

</html>
