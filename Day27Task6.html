<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <script src="jqery.js"></script>
    <style>
        .a * {
            border: 2px solid lightgray;
            padding: 20px;
            margin: 15px;
        }
    </style>
</head>

<body class="a">
    <div>
        <nav>
            <ul style="list-style-type: none;">
                <li>hi</li>
 
            </ul>
            <ul style="list-style-type: none;">
                <li>hi</li>

            </ul>
        </nav>
    </div>
</body>
<script>
    $(document).ready(function () {
        $("li").parentsUntil("div").css({ "border": "2px solid blue", 'font-size': '30px' });
    });
</script>

</html>
