<html>

<head>
    <title>About page</title>
    <style>
        nav {
            background-color: rgb(235, 155, 7);
        }

        a {
            color: rgb(2, 84, 198);
            font-size: 22px;
            padding: 13px;
            text-decoration: none;

        }

        form {
            background-color: beige;
            margin-left: 450px;
            width: 450px;
        }

        input {
            width: 300px;
            height: 30px;
            border-color: brown;

        }

        button {
            color: red;
            background-color: yellow;
            font-size: 19px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="demo.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h2>About page</h2>
    <h1 id="demo"></h1>
    <form id="">
        <h1>Enquiry Form</h1>
        <!-- regex -->

        <input type="tel" id="phone" name="phone" pattern="[6-9]{1}[0-9]{5}[0-9]{4}" placeholder="phone" required>
        <br><br>
        <button type="submit">Submit</button>
    </form>
    <script>
        var z = document.getElementById("phone");
        z.addEventListener('input', () => {
            z.setCustomValidity('')
            z.checkValidity()
        })
        z.addEventListener('invalid', () => {
            if (z.value === '') {
                z.setCustomValidity('Enter phone number')
            } else {
                z.setCustomValidity('Enter a phone number format correctly');
            }
        })

    </script>
</body>

</html>
