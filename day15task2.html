<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //STRING
        var a = "  LIVEWIRE  ";
        var b = "SALEM"
        document.write(a, "<br>");
        document.write(a.charAt(0), "<br>");
        document.write(a.charCodeAt(0), "<br>");
        document.write(a.concat(b), "<br>");
        document.write(a.endsWith("X"), "<br>");
        document.write(a.includes("LIVE"), "<br>");
        document.write(a.indexOf("E"), "<br>");
        document.write(a.lastIndexOf("E"), "<br>");
        document.write(a.length, "<br>");
        document.write(a.match("R"), "<br>");
        document.write(a.padStart(10, "*"), "<br>");
        document.write(a.padEnd(10, "*"), "<br>");
        document.write(a.repeat(2), "<br>");
        document.write(a.search("E"), "<br>");
        document.write(a.slice(2, 5), "<br>");
        document.write(a.substring(5, 1), "<br>");
        document.write(a.split(","), "<br>");
        document.write(a.toLowerCase(), "<br>");
        document.write(a.toUpperCase(), "<br>");
        var v = a.trim()
        document.write(a);
    </script>
</body>

</html>
