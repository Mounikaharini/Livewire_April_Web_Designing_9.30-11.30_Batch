<!DOCTYPE html>
<html>

<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            $('#txt').keyup(function () {
                var b = $(this).val();
                $.post("test.php", { txt: b }, function (data) {
                    $('#a').html(data);
                });
            });
        });
    </script>
</head>

<body>
    <input type="text" id="txt">
    <h1 id="a"></h1>
</body>

</html>
