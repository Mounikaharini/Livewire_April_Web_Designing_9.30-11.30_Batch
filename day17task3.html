<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            width: 100%;
            margin: 0;
            padding:0;
        }
        .main{
            display: grid;
            grid-template-columns: auto auto auto auto;
            justify-content: space-around;
            width: 90%;
            justify-content: center;
        }
        .div1{
            height: 400px;
            width: 250px;
            /* overflow: hidden; */
            justify-content: center;
        }
        img{
            height: 300px;
            
            /* overflow: hidden;
            width: 250px; */
        }
        button{
            height: 50px;
            width: 140px;
            border-radius: 100px;
            border: none;
            background-color: #e9b83f;
            color: white;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <h1>View Our Menu</h1>
    <div class="main">
        <div class="div1">
            <img src="10001.jpg" alt="" height="300" width="270">
            <h1>hot pizza</h1>
            <button>Order</button>
        </div>
        <div class="div1">
            <img src="10002.jpg" alt="">
            <h1>salads</h1>
            <button>Order</button>
        </div>
        <div class="div1">
            <img src="10003.jpeg" alt="">
            <h1>dessert</h1>
            <button>Order</button>
        </div>
        <div class="div1">
            <img src="10004.jpeg" alt="">
            <h1>Lemon Juice</h1>
            <button>Order</button>
        </div>
 
    </div>
</body>
</html>
