<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .a {
            width: 200px;
            height: 200px;
            background-color: #000000;
            animation-name: s;
            animation-duration: 2s;
            animation-iteration-count: 5;
            position: absolute;
            top: 10px;
            left: 10px;
        }

        @keyframes s {
            10% {
                background-color: blue;
            }

            50% {
                background-color: green;
            }

            80% {
                background-color: red;
            }

        }

        .b {
            width: 200px;
            height: 200px;
            background-color: #000000;
            animation-name: x;
            animation-duration: 2s;
            animation-iteration-count: 5;
            position: absolute;
            top: 10px;
            left: 10px;
        }

        @keyframes x {
            from {
                position: absolute;
                top: 10px;
                left: 10px;
            }

            to {
                position: absolute;
                top: 100px;
                left: 100px;
                transform: rotate(360deg);
                transform: scale(2);
            }
        }
    </style>
</head>

<body>
    <div class="a"></div>
    <div class="b"></div>
</body>

</html>
