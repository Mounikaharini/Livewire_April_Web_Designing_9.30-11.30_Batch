<html>

<head>
    <title>About page</title>
    <style>
        nav {
            background-color: rgb(235, 155, 7);
        }

        a {
            color: rgb(2, 84, 198);
            font-size: 22px;
            padding: 13px;
            text-decoration: none;

        }

        form {
            background-color: beige;
            margin-left: 450px;
            width: 450px;
        }

        input {
            width: 300px;
            height: 30px;
            border-color: brown;

        }

        button {
            color: red;
            background-color: yellow;
            font-size: 19px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="demo.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h2>About page</h2>
    <h1 id="demo"></h1>
    <form name="myform" action="#" onsubmit="return anup();">
        <h1>Enquiry Form</h1>
        <input type="text" name="email" placeholder="Email" />

        <br><br>
        <button type="submit">Submit</button>
    </form>
    <script>
        function anup() {
            var z = document.myform.email.value;
            var at = z.indexOf("@");
            var dot = z.lastIndexOf(".");
            if (at < 1 || dot < at + 2 || dot + 2 >= z.length) {
                alert("Email invalid");
                return false;
            }
        }

    </script>
</body>

</html>
