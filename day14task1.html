<script>
    // var a = 12345;

    var day = 6;
    switch(day){
        case 1:document.write("Sunday");break;
        case 2:document.write("Monday");break;
        case 3:document.write("Tuesday");break;
        case 4:document.write("Wednesday");break;
        case 5:document.write("Thursday");break;
        case 6:document.write("Friday");break;
        case 7:document.write("Saturday");break;
        default:document.write("Invalid day");
    }

    var color = prompt("Enter a color");
    switch(color){
        case "blue":document.write("It's Blue Color");break;
        case "black":document.write("It's Black Color");break;
        case "grey":document.write("It's Grey Color");break;
        default:document.write("Invalid Color");
    }

</script>
